<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panel de Bedelía — ISER Matriculación 2026</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    body { background: #f0f3f8; }

    .panel-login {
      max-width: 420px;
      margin: 80px auto;
      background: white;
      border-radius: 16px;
      padding: 40px;
      box-shadow: 0 8px 32px rgba(0,48,135,0.15);
      text-align: center;
    }

    .panel-login .logo-iser {
      height: 64px;
      margin-bottom: 20px;
    }

    .panel-login h2 {
      font-family: 'Source Serif 4', serif;
      color: var(--azul-iser);
      margin-bottom: 8px;
      font-size: 1.4rem;
    }

    .panel-login p {
      color: #888;
      font-size: 0.9rem;
      margin-bottom: 24px;
    }

    .login-input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid var(--gris-borde);
      border-radius: 8px;
      font-size: 1rem;
      font-family: 'IBM Plex Sans', sans-serif;
      letter-spacing: 0.1em;
      text-align: center;
      margin-bottom: 16px;
      transition: border-color 0.2s;
    }

    .login-input:focus {
      border-color: var(--azul-claro);
      outline: none;
    }

    .btn-login {
      width: 100%;
      padding: 12px;
      background: var(--azul-iser);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      font-family: 'IBM Plex Sans', sans-serif;
      transition: background 0.2s;
    }

    .btn-login:hover { background: var(--azul-claro); }

    .error-login {
      color: var(--rojo);
      font-size: 0.88rem;
      margin-top: 10px;
    }

    /* Panel principal */
    .panel-header {
      background: var(--azul-iser);
      color: white;
      padding: 16px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .panel-header h1 {
      font-family: 'Source Serif 4', serif;
      font-size: 1.2rem;
      font-weight: 700;
    }

    .panel-header .panel-subtitulo {
      font-size: 0.82rem;
      opacity: 0.8;
    }

    .btn-logout {
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.3);
      color: white;
      padding: 7px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
      font-family: 'IBM Plex Sans', sans-serif;
      transition: background 0.2s;
    }

    .btn-logout:hover { background: rgba(255,255,255,0.25); }

    .panel-body {
      max-width: 1200px;
      margin: 0 auto;
      padding: 28px 20px;
    }

    /* Selector de vista (para accesos múltiples) */
    .selector-vista {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .btn-vista {
      padding: 10px 20px;
      border-radius: 8px;
      border: 2px solid var(--gris-borde);
      background: white;
      cursor: pointer;
      font-family: 'IBM Plex Sans', sans-serif;
      font-weight: 600;
      color: var(--azul-iser);
      transition: all 0.2s;
    }

    .btn-vista.activo {
      background: var(--azul-iser);
      color: white;
      border-color: var(--azul-iser);
    }

    /* Stats */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 16px;
      margin-bottom: 28px;
    }

    .stat-card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      text-align: center;
      box-shadow: var(--sombra);
    }

    .stat-numero {
      font-size: 2.2rem;
      font-weight: 700;
      font-family: 'Source Serif 4', serif;
    }

    .stat-label {
      font-size: 0.8rem;
      color: #888;
      margin-top: 4px;
    }

    .stat-pendiente .stat-numero { color: #e06c00; }
    .stat-presentado .stat-numero { color: var(--azul-claro); }
    .stat-confirmado .stat-numero { color: var(--verde); }
    .stat-observado .stat-numero { color: var(--rojo); }
    .stat-total .stat-numero { color: var(--azul-iser); }

    /* Filtros */
    .filtros {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
      align-items: center;
    }

    .filtro-input {
      padding: 8px 14px;
      border: 1.5px solid var(--gris-borde);
      border-radius: 8px;
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 0.9rem;
      min-width: 220px;
    }

    .filtro-select {
      padding: 8px 14px;
      border: 1.5px solid var(--gris-borde);
      border-radius: 8px;
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 0.9rem;
    }

    /* Tabla */
    .tabla-container {
      background: white;
      border-radius: 12px;
      box-shadow: var(--sombra);
      overflow: hidden;
    }

    .tabla-alumnos {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.88rem;
    }

    .tabla-alumnos th {
      background: var(--azul-iser);
      color: white;
      padding: 12px 16px;
      text-align: left;
      font-weight: 600;
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      white-space: nowrap;
    }

    .tabla-alumnos td {
      padding: 11px 16px;
      border-bottom: 1px solid #f0f0f0;
      vertical-align: middle;
    }

    .tabla-alumnos tr:hover td { background: #f8faff; }

    .tabla-alumnos tr:last-child td { border-bottom: none; }

    /* Estado badges */
    .estado-badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
      white-space: nowrap;
    }

    .estado-Pendiente { background: #fff3cd; color: #856404; }
    .estado-Presentado { background: #cce5ff; color: #004085; }
    .estado-Confirmado { background: #d4edda; color: #155724; }
    .estado-Observado { background: #f8d7da; color: #721c24; }

    /* Select estado en tabla */
    .select-estado {
      padding: 4px 8px;
      border: 1px solid var(--gris-borde);
      border-radius: 6px;
      font-size: 0.82rem;
      font-family: 'IBM Plex Sans', sans-serif;
      cursor: pointer;
    }

    /* Materias en tabla */
    .materias-mini {
      font-size: 0.75rem;
      color: #555;
      max-width: 200px;
    }

    .materias-mini details summary {
      cursor: pointer;
      color: var(--azul-claro);
      font-weight: 600;
    }

    /* PDF link */
    .link-pdf {
      color: var(--azul-claro);
      text-decoration: none;
      font-size: 0.82rem;
      font-weight: 600;
    }

    .link-pdf:hover { text-decoration: underline; }

    /* Sin datos */
    .sin-datos {
      text-align: center;
      padding: 40px;
      color: #aaa;
      font-size: 1rem;
    }

    /* Loading */
    .panel-loading {
      text-align: center;
      padding: 60px;
      color: #888;
    }

    .anio-tag {
      display: inline-block;
      background: var(--gris-claro);
      border: 1px solid var(--gris-borde);
      border-radius: 4px;
      padding: 2px 7px;
      font-size: 0.75rem;
      color: #555;
    }

    @media (max-width: 768px) {
      .panel-header { padding: 12px 16px; }
      .tabla-alumnos { font-size: 0.8rem; }
      .tabla-alumnos th, .tabla-alumnos td { padding: 8px 10px; }
    }
  </style>
</head>
<body>

  <!-- LOGIN -->
  <div id="vista-login">
    <div class="panel-login">
      <img src="iser-logo.png" alt="ISER" class="logo-iser" />
      <h2>Panel de Bedelía</h2>
      <p>ISER — Matriculación 2026</p>
      <input type="password" class="login-input" id="input-clave"
        placeholder="Ingresá tu clave de acceso"
        onkeydown="if(event.key==='Enter') iniciarSesion()" />
      <button class="btn-login" onclick="iniciarSesion()">Ingresar</button>
      <div class="error-login" id="error-login"></div>
    </div>
  </div>

  <!-- PANEL PRINCIPAL -->
  <div id="vista-panel" style="display:none;">

    <div class="panel-header">
      <div>
        <div class="panel-header h1" id="panel-titulo" style="font-family:'Source Serif 4',serif;font-size:1.2rem;font-weight:700;">Panel de Bedelía</div>
        <div class="panel-subtitulo">ISER — Matriculación 2026</div>
      </div>
      <button class="btn-logout" onclick="cerrarSesion()">Cerrar sesión</button>
    </div>

    <div class="panel-body">

      <!-- Selector de vista (para accesos con múltiples carreras) -->
      <div class="selector-vista" id="selector-vista" style="display:none;"></div>

      <!-- Stats -->
      <div class="stats-grid" id="stats-grid">
        <div class="stat-card stat-total"><div class="stat-numero" id="stat-total">—</div><div class="stat-label">Total</div></div>
        <div class="stat-card stat-pendiente"><div class="stat-numero" id="stat-pendiente">—</div><div class="stat-label">Pendiente de firma</div></div>
        <div class="stat-card stat-presentado"><div class="stat-numero" id="stat-presentado">—</div><div class="stat-label">Presentado</div></div>
        <div class="stat-card stat-confirmado"><div class="stat-numero" id="stat-confirmado">—</div><div class="stat-label">Confirmado</div></div>
        <div class="stat-card stat-observado"><div class="stat-numero" id="stat-observado">—</div><div class="stat-label">Observado</div></div>
      </div>

      <!-- Filtros -->
      <div class="filtros">
        <input type="text" class="filtro-input" id="filtro-buscar"
          placeholder="🔍 Buscar por apellido, nombre o DNI..."
          oninput="aplicarFiltros()" />
        <select class="filtro-select" id="filtro-estado" onchange="aplicarFiltros()">
          <option value="">Todos los estados</option>
          <option value="Pendiente de firma">Pendiente de firma</option>
          <option value="Presentado">Presentado</option>
          <option value="Confirmado">Confirmado</option>
          <option value="Observado">Observado</option>
        </select>
        <select class="filtro-select" id="filtro-anio" onchange="aplicarFiltros()">
          <option value="">Todos los años</option>
          <option value="1">1° Año</option>
          <option value="2">2° Año</option>
          <option value="3">3° Año</option>
        </select>
        <button class="btn-volver" onclick="recargarDatos()" style="padding:8px 16px;">↻ Actualizar</button>
      </div>

      <!-- Tabla -->
      <div class="tabla-container">
        <div class="panel-loading" id="panel-loading">Cargando datos...</div>
        <table class="tabla-alumnos" id="tabla-alumnos" style="display:none;">
          <thead>
            <tr>
              <th>Apellido y Nombre</th>
              <th>DNI</th>
              <th>Año</th>
              <th>Fecha</th>
              <th>Email / Tel</th>
              <th>Materias</th>
              <th>Estado</th>
              <th>PDF</th>
            </tr>
          </thead>
          <tbody id="tabla-body"></tbody>
        </table>
        <div class="sin-datos" id="sin-datos" style="display:none;">
          No se encontraron alumnos con los filtros seleccionados.
        </div>
      </div>

    </div>
  </div>

  <script>
    let claveActual = "";
    let datosCompletos = {};
    let vistaActual = "";
    let selectorInfo = {};

    async function iniciarSesion() {
      const clave = document.getElementById("input-clave").value.trim();
      if (!clave) return;

      document.getElementById("error-login").textContent = "";
      document.getElementById("input-clave").disabled = true;

      try {
        const res = await fetch(`/api/panel?clave=${encodeURIComponent(clave)}`);
        const data = await res.json();

        if (!res.ok) {
          document.getElementById("error-login").textContent = "Clave incorrecta. Verificá e intentá nuevamente.";
          document.getElementById("input-clave").disabled = false;
          return;
        }

        claveActual = clave;
        datosCompletos = data;

        document.getElementById("vista-login").style.display = "none";
        document.getElementById("vista-panel").style.display = "block";
        document.getElementById("panel-titulo").textContent = `Panel — ${data.nombre}`;

        if (data.selector && Object.keys(data.sheets).length > 1) {
          configurarSelector(data.sheets);
        } else {
          const primeraKey = Object.keys(data.sheets)[0];
          vistaActual = primeraKey;
          renderizarTabla(data.sheets[primeraKey]);
        }

      } catch (err) {
        document.getElementById("error-login").textContent = "Error de conexión. Intentá nuevamente.";
        document.getElementById("input-clave").disabled = false;
      }
    }

    function configurarSelector(sheets) {
      const cont = document.getElementById("selector-vista");
      cont.style.display = "flex";
      cont.innerHTML = "";

      Object.entries(sheets).forEach(([key, info], i) => {
        const btn = document.createElement("button");
        btn.className = "btn-vista" + (i === 0 ? " activo" : "");
        btn.textContent = info.nombre;
        btn.onclick = () => {
          document.querySelectorAll(".btn-vista").forEach(b => b.classList.remove("activo"));
          btn.classList.add("activo");
          vistaActual = key;
          renderizarTabla(sheets[key]);
        };
        cont.appendChild(btn);
        if (i === 0) {
          vistaActual = key;
          renderizarTabla(info);
        }
      });
    }

    function renderizarTabla(sheetData) {
      const filas = sheetData?.datos || [];
      document.getElementById("panel-loading").style.display = "none";

      actualizarStats(filas);
      renderFilas(filas);
    }

    function actualizarStats(filas) {
      document.getElementById("stat-total").textContent = filas.length;
      document.getElementById("stat-pendiente").textContent = filas.filter(f => f["Estado"] === "Pendiente de firma").length;
      document.getElementById("stat-presentado").textContent = filas.filter(f => f["Estado"] === "Presentado").length;
      document.getElementById("stat-confirmado").textContent = filas.filter(f => f["Estado"] === "Confirmado").length;
      document.getElementById("stat-observado").textContent = filas.filter(f => f["Estado"] === "Observado").length;
    }

    function renderFilas(filas) {
      const buscar = document.getElementById("filtro-buscar").value.toLowerCase();
      const estado = document.getElementById("filtro-estado").value;
      const anio = document.getElementById("filtro-anio").value;

      const filtradas = filas.filter(f => {
        const texto = `${f["Apellidos"]} ${f["Nombres"]} ${f["DNI"]}`.toLowerCase();
        if (buscar && !texto.includes(buscar)) return false;
        if (estado && f["Estado"] !== estado) return false;
        if (anio && f["Año Matrícula"] !== anio) return false;
        return true;
      });

      const tbody = document.getElementById("tabla-body");
      tbody.innerHTML = "";

      if (filtradas.length === 0) {
        document.getElementById("tabla-alumnos").style.display = "none";
        document.getElementById("sin-datos").style.display = "block";
        return;
      }

      document.getElementById("tabla-alumnos").style.display = "table";
      document.getElementById("sin-datos").style.display = "none";

      filtradas.forEach(fila => {
        const tr = document.createElement("tr");

        // Materias resumen
        const pend1 = fila["Pendientes - 1er Año"] || "";
        const pend2 = fila["Pendientes - 2do Año"] || "";
        const pend3 = fila["Pendientes - 3er Año"] || "";
        const rec1 = fila["Recursar - 1er Año"] || "";
        const rec2 = fila["Recursar - 2do Año"] || "";
        const rec3 = fila["Recursar - 3er Año"] || "";
        const todasPend = [pend1, pend2, pend3].filter(Boolean).join(" | ");
        const todasRec = [rec1, rec2, rec3].filter(Boolean).join(" | ");
        const totalMaterias = (todasPend + todasRec).split("|").filter(m => m.trim()).length;

        const estadoActual = fila["Estado"] || "Pendiente de firma";
        const pdfUrl = fila["PDF URL"] || "";

        tr.innerHTML = `
          <td>
            <strong>${fila["Apellidos"] || "—"}</strong><br>
            <span style="color:#666;font-size:0.82rem;">${fila["Nombres"] || ""}</span>
          </td>
          <td>${fila["DNI"] || "—"}</td>
          <td><span class="anio-tag">${fila["Año Matrícula"] || "—"}°</span></td>
          <td style="white-space:nowrap;font-size:0.82rem;">${fila["Fecha Formulario"] || "—"}</td>
          <td style="font-size:0.8rem;">
            ${fila["Email"] || ""}<br>
            <span style="color:#888;">${fila["Tel Celular"] || ""}</span>
          </td>
          <td class="materias-mini">
            ${totalMaterias > 0 ? `
              <details>
                <summary>${totalMaterias} materia(s)</summary>
                ${todasPend ? `<div><b>Pendientes:</b> ${todasPend}</div>` : ""}
                ${todasRec ? `<div><b>Recursar:</b> ${todasRec}</div>` : ""}
              </details>
            ` : '<span style="color:#aaa;">Sin materias</span>'}
          </td>
          <td>
            <select class="select-estado" data-row="${fila._rowIndex}"
              onchange="cambiarEstado(this, '${vistaActual}')">
              <option ${estadoActual === "Pendiente de firma" ? "selected" : ""}>Pendiente de firma</option>
              <option ${estadoActual === "Presentado" ? "selected" : ""}>Presentado</option>
              <option ${estadoActual === "Confirmado" ? "selected" : ""}>Confirmado</option>
              <option ${estadoActual === "Observado" ? "selected" : ""}>Observado</option>
            </select>
          </td>
          <td>
            ${pdfUrl ? `<a href="${pdfUrl}" target="_blank" class="link-pdf">📄 Ver PDF</a>` : '<span style="color:#aaa;font-size:0.8rem;">—</span>'}
          </td>
        `;
        tbody.appendChild(tr);
      });
    }

    async function cambiarEstado(selectEl, sheetKey) {
      const nuevoEstado = selectEl.value;
      const rowIndex = selectEl.dataset.row;

      try {
        const res = await fetch("/api/panel", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            clave: claveActual,
            accion: "actualizar",
            sheetKey,
            rowIndex: parseInt(rowIndex),
            estado: nuevoEstado,
          }),
        });
        if (!res.ok) throw new Error("Error al actualizar");

        // Actualizar localmente
        const sheetData = datosCompletos.sheets[sheetKey];
        const fila = sheetData.datos.find(f => f._rowIndex === parseInt(rowIndex));
        if (fila) fila["Estado"] = nuevoEstado;
        actualizarStats(sheetData.datos);

      } catch (err) {
        alert("Error al cambiar el estado. Intentá nuevamente.");
        console.error(err);
      }
    }

    function aplicarFiltros() {
      const sheetData = datosCompletos.sheets?.[vistaActual];
      if (sheetData) renderFilas(sheetData.datos);
    }

    async function recargarDatos() {
      document.getElementById("panel-loading").style.display = "block";
      document.getElementById("tabla-alumnos").style.display = "none";
      document.getElementById("sin-datos").style.display = "none";

      try {
        const res = await fetch(`/api/panel?clave=${encodeURIComponent(claveActual)}`);
        const data = await res.json();
        datosCompletos = data;

        const sheetData = data.sheets[vistaActual];
        renderizarTabla(sheetData);
      } catch (err) {
        alert("Error al actualizar datos.");
      }
    }

    function cerrarSesion() {
      claveActual = "";
      datosCompletos = {};
      vistaActual = "";
      document.getElementById("vista-panel").style.display = "none";
      document.getElementById("vista-login").style.display = "block";
      document.getElementById("input-clave").value = "";
      document.getElementById("input-clave").disabled = false;
    }
  </script>

</body>
</html>
